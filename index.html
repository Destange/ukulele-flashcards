<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Accords Ukulélé — Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2D7D5A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Accords Ukulélé" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F0E8;
      --card: #FFFFFF;
      --text: #1C1C1C;
      --muted: #8C8880;
      --accent: #B85C2A;
      --accent-light: #F5E0CE;
      --correct: #2D8C5F;
      --wrong: #C03A2B;
      --border: #E8E0D5;
      --mode-bases: #D4815C;
      --mode-bases-bg: #FAE7DC;
      --mode-ess: #2D7D5A;
      --mode-ess-bg: #E3F2EB;
      --mode-comp: #2A5FA8;
      --mode-comp-bg: #E3EDFA;
      --mode-all: #7D2A85;
      --mode-all-bg: #F3E5F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 24px;
    }
    #app { width: 100%; max-width: 430px; display: flex; flex-direction: column; align-items: center; flex: 1; }
    .app-footer { width: 100%; max-width: 430px; text-align: center; padding: 18px 0 10px; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 300; color: var(--muted); opacity: 0.55; }
    .footer-link { color: inherit; text-decoration: underline; text-decoration-color: var(--border); transition: opacity .15s; }
    .footer-link:hover { opacity: 1; }

    /* HEADER */
    .header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 19px; letter-spacing: -0.3px; }
    .header-title b { color: var(--accent); font-weight: 700; }
    .btn-ghost { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; color: var(--accent); background: var(--accent-light); border: none; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: opacity .15s; }
    .btn-ghost:hover { opacity: .72; }

    /* SESSION PROGRESS */
    .prog-wrap { width: 100%; margin-bottom: 18px; }
    .prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .prog-meta .tries-count { font-weight: 600; color: var(--text); }
    .prog-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

    /* CARD */
    .card-scene { width: 100%; perspective: 900px; margin-bottom: 20px; }
    .card-body { width: 100%; height: 400px; position: relative; transform-style: preserve-3d; transition: transform 0.52s cubic-bezier(.4,0,.2,1); }
    .card-body.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; background: var(--card); border-radius: 22px; box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 8px 28px rgba(0,0,0,.07); backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18px 24px; overflow: hidden; }
    .card-face.back { transform: rotateY(180deg); }
    /* Face réponse avec diagramme : tag (1 ligne) + diagramme centrés en bloc, marge équilibrée */
    .card-face.has-diag { justify-content: center; padding-top: 30px; padding-bottom: 30px; }
    .card-face.has-diag .face-tag { margin-bottom: -10px !important; }
    /* Question avec diagramme : tag (2 lignes) + diagramme, ancrage haut */
    .card-face.has-diag-q { justify-content: flex-start; padding-top: 32px; padding-bottom: 20px; }
    .card-face.has-diag-q .face-tag { margin-bottom: -10px !important; }
    .face-tag { font-size: 20px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; text-align: center; line-height: 1.3; }
    .face-tag.hi { color: var(--accent); }
    .chord-big { font-family: 'Playfair Display', serif; font-size: 140px; line-height: 1; letter-spacing: -4px; text-align: center; }
    .chord-big.md { font-size: 110px; letter-spacing: -3px; }
    .chord-big.sm { font-size: 84px; letter-spacing: -2px; }
    .chord-sub { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--muted); margin-top: 6px; letter-spacing: 0; text-align: center; }
    .card-hint { font-size: 13px; color: var(--muted); margin-top: 10px; text-align: center; font-weight: 300; }
    .diag-holder svg { width: 200px; height: auto; }

    /* BUTTONS */
    .btn-main { width: 100%; padding: 18px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 500; background: var(--accent); color: #FFF; border: none; border-radius: 16px; cursor: pointer; transition: opacity .15s ease, visibility 0s .15s, transform .1s; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(184,92,42,.22); visibility: visible; }
    .btn-main.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    /* Stack reveal-btn + ok/ko-row dans la même cellule grid : hauteur stable */
    .actions-stack { width: 100%; display: grid; grid-template-areas: 'a'; }
    .actions-stack > .btn-main { grid-area: a; margin-bottom: 0; }
    .actions-stack > .btn-row  { grid-area: a; margin-bottom: 0; align-self: stretch; }
    .btn-main svg { width: 20px; height: 20px; color: #FFF; flex-shrink: 0; }
    .btn-main:hover { opacity: .84; }
    .btn-main:active { transform: scale(.985); }
    .btn-row { width: 100%; display: flex; gap: 12px; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    .btn-row.vis { opacity: 1; pointer-events: all; }
    .btn-ok, .btn-ko { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-ok { background: var(--correct); color: #FFF; }
    .btn-ko { background: var(--wrong); color: #FFF; }
    .btn-ok:hover, .btn-ko:hover { opacity: .84; }
    .btn-ok:active, .btn-ko:active { transform: scale(.985); }

    /* HOME */
    .home { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 14px; }
    .home-icon { font-size: 36px; margin-bottom: 6px; }
    .home-h1 { font-family: 'Playfair Display', serif; font-size: 32px; line-height: 1.15; letter-spacing: -1.2px; text-align: center; margin-bottom: 4px; }
    .home-h1 em { color: var(--accent); font-style: italic; }
    .home-sub { font-size: 12px; color: var(--muted); text-align: center; font-weight: 300; line-height: 1.6; margin-bottom: 18px; }
    .mode-cards { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .mode-card { background: var(--card); border-radius: 18px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.06); cursor: pointer; transition: box-shadow .15s, transform .12s; }
    .mode-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.10); transform: translateY(-1px); }
    .mode-card:active { transform: scale(.988); }
    .mode-card.bases { border-left: 4px solid var(--mode-bases); }
    .mode-card.ess  { border-left: 4px solid var(--mode-ess); }
    .mode-card.comp { border-left: 4px solid var(--mode-comp); }
    .mode-card.all  { border-left: 4px solid var(--mode-all); }
    .mode-icon-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .mode-icon-box.bases { background: var(--mode-bases-bg); }
    .mode-icon-box.ess  { background: var(--mode-ess-bg); }
    .mode-icon-box.comp { background: var(--mode-comp-bg); }
    .mode-icon-box.all  { background: var(--mode-all-bg); }
    .mode-info { flex: 1; }
    .mode-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .mode-desc { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.4; }
    .mode-prog-row { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .mode-prog-fill { height: 100%; border-radius: 2px; }
    .mode-prog-fill.bases { background: var(--mode-bases); }
    .mode-prog-fill.ess  { background: var(--mode-ess); }
    .mode-prog-fill.comp { background: var(--mode-comp); }
    .mode-prog-fill.all  { background: var(--mode-all); }
    .mode-stat { text-align: right; flex-shrink: 0; }
    .mode-stat-n { font-family: 'Playfair Display', serif; font-size: 22px; display: block; line-height: 1; margin-bottom: 2px; }
    .mode-stat-n.bases { color: var(--mode-bases); }
    .mode-stat-n.ess  { color: var(--mode-ess); }
    .mode-stat-n.comp { color: var(--mode-comp); }
    .mode-stat-n.all  { color: var(--mode-all); }
    .mode-stat-l { font-size: 10px; color: var(--muted); }
    .btn-ref-link { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; padding: 8px; text-decoration: underline; text-decoration-color: var(--border); }
    .btn-ref-link:hover { color: var(--text); }
    .home-links { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 4px; }
    .home-action-btn { width: 100%; display: flex; align-items: center; gap: 12px; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 18px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: border-color .15s, box-shadow .15s, transform .1s; text-align: left; }
    .home-action-btn:hover { border-color: var(--accent); box-shadow: 0 3px 14px rgba(184,92,42,.12); transform: translateY(-1px); }
    .home-action-btn:active { transform: scale(.988); }
    .hab-icon { font-size: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .hab-icon svg { width: 22px; height: 22px; color: var(--accent); }
    .hab-text { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
    .hab-arrow { flex-shrink: 0; display: flex; align-items: center; transition: transform .15s; color: var(--muted); }
    .hab-arrow svg { width: 20px; height: 20px; }
    .home-action-btn:hover .hab-arrow { transform: translateX(3px); color: var(--accent); }
    .home-data-bar { width: 100%; display: flex; gap: 8px; margin-top: 10px; }
    .btn-data { flex: 1; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 10px; cursor: pointer; transition: border-color .15s, color .15s, background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-data svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
    .btn-data:hover { border-color: var(--accent); background: var(--accent-light); }
    .streak-home { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 500; margin-top: -6px; margin-bottom: 16px; }
    .streak-home.active { color: var(--accent); }
    .streak-home.cold { color: var(--muted); font-weight: 300; }
    .end-streak-card { width: 100%; background: var(--accent-light); border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; border-left: 3px solid var(--accent); }
    .end-streak-left { display: flex; align-items: center; gap: 10px; }
    .end-streak-flame { font-size: 26px; line-height: 1; }
    .end-streak-count { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); line-height: 1; }
    .end-streak-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .end-streak-best { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.5; }
    .end-streak-best strong { display: block; font-size: 15px; font-weight: 600; color: var(--text); }

    /* SESSION END */
    .end-screen { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 24px; }
    .end-badge { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; margin-bottom: 28px; }
    .end-score-wrap { text-align: center; margin-bottom: 32px; }
    .end-emoji { font-size: 52px; margin-bottom: 12px; display: block; }
    .end-score { font-family: 'Playfair Display', serif; font-size: 68px; line-height: 1; letter-spacing: -2px; }
    .end-score span { font-size: 32px; color: var(--muted); letter-spacing: 0; }
    .end-label { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .end-mastery-card { width: 100%; background: var(--card); border-radius: 18px; padding: 20px 22px; margin-bottom: 24px; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
    .end-mastery-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .end-mastery-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .end-m-val { font-family: 'Playfair Display', serif; font-size: 30px; white-space: nowrap; }
    .end-m-val .slash { font-size: 18px; color: var(--muted); }
    .end-m-arrow { font-size: 18px; color: var(--muted); }
    .end-m-delta { font-size: 13px; font-weight: 500; }
    .end-m-delta.up   { color: var(--correct); }
    .end-m-delta.same { color: var(--muted); }
    .end-track { flex: 1; }
    .end-prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .end-prog-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }
    .end-prog-pct { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }
    .end-btn-row { width: 100%; display: flex; gap: 12px; }
    .btn-replay { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s; color: #FFF; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-replay svg { width: 18px; height: 18px; color: #FFF; flex-shrink: 0; }
    .btn-replay:hover { opacity: .84; }
    .btn-home-end { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500; border: 1.5px solid var(--border); border-radius: 16px; cursor: pointer; background: var(--card); color: var(--text); transition: background .12s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-home-end svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
    .btn-home-end:hover { background: var(--border); }

    /* REFERENCE */
    .ref-screen { width: 100%; }
    .ref-top { display: flex; align-items: center; gap: 14px; padding: 18px 0 16px; }
    /* Boutons navigation (retour / accueil) — version visible */
    .btn-nav-back, .btn-nav-home { display: inline-flex; align-items: center; gap: 7px; height: 44px; padding: 0 16px 0 12px; background: var(--card); border: 1.5px solid var(--border); border-radius: 22px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); transition: background .12s, border-color .12s, transform .1s; box-shadow: 0 1px 3px rgba(0,0,0,.04); -webkit-tap-highlight-color: transparent; }
    .btn-nav-back:hover, .btn-nav-home:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .btn-nav-back:active, .btn-nav-home:active { transform: scale(.96); }
    .btn-nav-back svg, .btn-nav-home svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-nav-label { line-height: 1; }
    /* Variante compacte (ronde) pour les écrans étroits / sans label */
    .btn-circ { width: 44px; height: 44px; flex-shrink: 0; background: var(--card); border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .12s, border-color .12s, transform .1s; box-shadow: 0 1px 3px rgba(0,0,0,.04); -webkit-tap-highlight-color: transparent; }
    .btn-circ:hover { background: var(--accent-light); border-color: var(--accent); }
    .btn-circ:active { transform: scale(.94); }
    .btn-circ svg { width: 20px; height: 20px; }
    @media (max-width: 360px) {
      .btn-nav-back .btn-nav-label, .btn-nav-home .btn-nav-label { display: none; }
      .btn-nav-back, .btn-nav-home { width: 44px; padding: 0; justify-content: center; border-radius: 50%; }
    }
    .ref-h { font-family: 'Playfair Display', serif; font-size: 21px; }
    .sort-bar { width: 100%; display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .sort-btn { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all .14s; white-space: nowrap; }
    .sort-btn.active { background: var(--text); color: #FFF; border-color: var(--text); }
    .ref-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ref-item { background: var(--card); border-radius: 14px; padding: 12px 8px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 6px rgba(0,0,0,.05); cursor: pointer; transition: box-shadow .14s, transform .1s; }
    .ref-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .ref-item:active { transform: scale(.94); }
    .ref-item svg { width: 70px; height: auto; }
    .ref-name { font-family: 'Playfair Display', serif; font-size: 13px; margin-top: 5px; text-align: center; }
    .ref-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .ref-fill { height: 100%; border-radius: 2px; }
    .ref-pct { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .ref-footer { margin-top: 24px; text-align: center; }
    .btn-reset { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; padding: 8px; text-decoration: underline; text-decoration-color: var(--border); }
    .btn-reset:hover { color: var(--wrong); }

    /* ── CUSTOM SELECT ── */
    .sel-screen { width:100%; }
    .sel-top { display:flex; align-items:center; gap:14px; padding:18px 0 10px; }
    .sel-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .sel-count { font-size:13px; font-weight:600; }
    .sel-count.ok   { color:var(--correct); }
    .sel-count.warn { color:var(--accent); }
    .sel-count.bad  { color:var(--muted); }
    .sel-actions { display:flex; gap:10px; }
    .btn-sel-link { background:none; border:none; font-family:'Outfit',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; padding:4px 8px; text-decoration:underline; text-decoration-color:var(--border); border-radius:6px; }
    .btn-sel-link:hover { color:var(--text); }
    .sel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .sel-item { background:var(--card); border-radius:14px; padding:10px 6px 8px; display:flex; flex-direction:column; align-items:center; box-shadow:0 1px 6px rgba(0,0,0,.05); cursor:pointer; border:2.5px solid transparent; transition:border-color .12s, background .12s, transform .08s; position:relative; user-select:none; -webkit-tap-highlight-color:transparent; }
    .sel-item:active { transform:scale(.94); }
    .sel-item.selected { border-color:var(--accent); background:var(--accent-light); }
    .sel-item svg { width:60px; height:auto; }
    .sel-item-name { font-family:'Playfair Display',serif; font-size:12px; margin-top:4px; text-align:center; line-height:1.3; }
    .sel-check { position:absolute; top:5px; right:5px; width:17px; height:17px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; opacity:0; transform:scale(.5); transition:opacity .14s, transform .14s; }
    .sel-item.selected .sel-check { opacity:1; transform:scale(1); }
    .btn-start-custom { width:100%; padding:18px; font-family:'Outfit',sans-serif; font-size:16px; font-weight:600; background:var(--accent); color:#FFF; border:none; border-radius:16px; cursor:pointer; transition:opacity .12s, transform .1s; box-shadow:0 5px 20px rgba(184,92,42,.28); margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-start-custom svg { width:20px; height:20px; color:#FFF; flex-shrink:0; }
    .btn-start-custom:disabled { background:var(--border); color:var(--muted); box-shadow:none; cursor:not-allowed; }
    .btn-start-custom:not([disabled]):hover { opacity:.88; }
    .btn-start-custom:not([disabled]):active { transform:scale(.985); }
    .custom-sandbox-note { font-size:12px; color:var(--muted); text-align:center; line-height:1.6; margin-bottom:4px; }
    .end-sandbox-card { width:100%; background:var(--accent-light); border-radius:18px; padding:18px 22px; margin-bottom:24px; border-left:4px solid var(--accent); }
    .end-sandbox-title { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .end-sandbox-body { font-size:13px; color:var(--text); line-height:1.6; font-weight:300; }

/* ══════════════════════════════════════════
   AUDIO
   Success : accord majeur qui monte d'un
   demi-ton à chaque bonne réponse d'affilée.
   Base : La3 (220 Hz) — après 9 demi-tons
   on arrive à Fa#4 (≈ 370 Hz), jamais strident.
   Fail : bref glissando descendant, discret.
══════════════════════════════════════════ */
var _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

// streak = nombre de bonnes réponses consécutives (0-based pour le calcul)
function playSuccess(streak) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  streak = streak || 0;
  var semi = Math.pow(2, 1/12);         // ratio d'un demi-ton
  var shift = Math.pow(semi, streak);   // transposition
  var now = ctx.currentTime;
  // Accord majeur : fondamentale A3 + tierce C#4 + quinte E4
  [[220.00, 0.12],[277.18, 0.09],[329.63, 0.07]].forEach(function(pair) {
    var freq = pair[0] * shift, vol = pair[1];
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + 0.014);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.58);
    osc.start(now);
    osc.stop(now + 0.59);
  });
}

function playVictory() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var now = ctx.currentTime;
  // Fanfare : arpège rapide C4→E4→G4→C5 puis accord tenu éclatant
  var arp = [[261.63,0],[329.63,0.07],[392.00,0.14],[523.25,0.21]];
  arp.forEach(function(p){
    var osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='triangle';
    osc.frequency.value=p[0];
    var t=now+p[1];
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
    osc.start(t); osc.stop(t+0.30);
  });
  // Accord final tenu : C5+E5+G5+C6, brillant
  var chord=[[523.25,0.16],[659.25,0.13],[784.00,0.10],[1046.50,0.07]];
  chord.forEach(function(p){
    var osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.value=p[0];
    var t=now+0.30;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(p[1],t+0.025);
    g.gain.setValueAtTime(p[1],t+0.30);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.90);
    osc.start(t); osc.stop(t+0.92);
  });
  // Petite scintille finale une octave au dessus
  [1046.50,1318.51].forEach(function(freq,i){
    var osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.value=freq;
    var t=now+0.65+i*0.07;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.06,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
    osc.start(t); osc.stop(t+0.36);
  });
}

function playFail() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var now = ctx.currentTime;
  // Deux tons descendants (demi-ton + quarte) — mou et déceptif
  [[311.13, 0.10],[233.08, 0.08]].forEach(function(pair, i) {
    var freq = pair[0], vol = pair[1];
    var delay = i * 0.10;
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + delay);
    osc.frequency.linearRampToValueAtTime(freq * 0.92, now + delay + 0.20);
    gain.gain.setValueAtTime(0, now + delay);
    gain.gain.linearRampToValueAtTime(vol, now + delay + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.38);
    osc.start(now + delay);
    osc.stop(now + delay + 0.39);
  });
}

/* ══════════════════════════════════════════
   SVG DIAGRAM
══════════════════════════════════════════ */
function drawDiagram(chord, size) {
  var frets   = chord.frets;
  var fingers = chord.fingers || null;
  var barre   = chord.barre   || null;
  var sm = (size === 'sm');
  var W = sm?80:120, H = sm?105:185;
  var pL = sm?12:18, pR = sm?12:18;
  var pTop = sm?18:28, nutH = sm?5:7, pBot = sm?6:8;
  var nutY = pTop + nutH;
  var gW = W-pL-pR, gH = H-nutY-pBot;
  var sw = gW/3, fh = gH/4;
  var r = Math.min(sw,fh)*0.44;
  var fnSz = sm ? 7.5 : 11;
  var s = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  // ── Cercles ouverts au-dessus du sillet ───────────────────
  for (var i=0;i<4;i++) {
    if (frets[i]===0) {
      var x0=(pL+i*sw).toFixed(1);
      s += '<circle cx="'+x0+'" cy="'+(pTop-(sm?5:8)).toFixed(1)+'" r="'+(sm?2.8:4.2).toFixed(1)+'" fill="none" stroke="#1C1C1C" stroke-width="'+(sm?1.4:1.8)+'"/>';
    }
  }
  // ── Sillet ────────────────────────────────────────────────
  s += '<rect x="'+(pL-2).toFixed(1)+'" y="'+pTop+'" width="'+(gW+4).toFixed(1)+'" height="'+nutH+'" fill="#1C1C1C" rx="1"/>';
  // ── Cordes verticales ─────────────────────────────────────
  for (var i=0;i<4;i++) {
    var x1=(pL+i*sw).toFixed(1);
    s += '<line x1="'+x1+'" y1="'+nutY+'" x2="'+x1+'" y2="'+(nutY+gH).toFixed(1)+'" stroke="#1C1C1C" stroke-width="'+(sm?1:1.4)+'"/>';
  }
  // ── Frettes ───────────────────────────────────────────────
  for (var f=1;f<=4;f++) {
    var y1=(nutY+f*fh).toFixed(1);
    s += '<line x1="'+pL+'" y1="'+y1+'" x2="'+(pL+gW).toFixed(1)+'" y2="'+y1+'" stroke="#1C1C1C" stroke-width="'+(sm?0.7:0.9)+'"/>';
  }
  // ── Ovale barré ────────────────────────────────────────────
  if (barre) {
    var barreY = nutY + (barre.fret - 0.5) * fh;
    var bx1    = pL + barre.fromStr * sw;
    var bx2    = pL + barre.toStr   * sw;
    var bH     = r * 0.95;
    s += '<rect x="'+(bx1 - r*1.3).toFixed(1)+'" y="'+(barreY - bH).toFixed(1)+'" width="'+(bx2 - bx1 + r*2.6).toFixed(1)+'" height="'+(bH*2).toFixed(1)+'" rx="'+bH.toFixed(1)+'" fill="#1C1C1C"/>';
    s += '<text x="'+((bx1+bx2)/2).toFixed(1)+'" y="'+barreY.toFixed(1)+'" font-family="Outfit,sans-serif" font-size="'+fnSz+'" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">1</text>';
  }
  // ── Points individuels (hors barré) ───────────────────────
  for (var i=0;i<4;i++) {
    if (frets[i]<=0) continue;
    if (barre && frets[i]===barre.fret && i>=barre.fromStr && i<=barre.toStr) continue;
    var xd=(pL+i*sw).toFixed(1);
    var yd=(nutY+(frets[i]-0.5)*fh).toFixed(1);
    s += '<circle cx="'+xd+'" cy="'+yd+'" r="'+r.toFixed(1)+'" fill="#1C1C1C"/>';
    var fn = fingers ? fingers[i] : null;
    if (fn && fn !== 0) {
      s += '<text x="'+xd+'" y="'+yd+'" font-family="Outfit,sans-serif" font-size="'+fnSz+'" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">'+fn+'</text>';
    }
  }
  s += '</svg>';
  return s;
}

/* ══════════════════════════════════════════
   SPACED REPETITION — SM-2 avec timestamps réels
   
   Chaque item stocke :
     interval    : jours avant la prochaine révision (float)
     ef          : easiness factor (min 1.3, défaut 2.5)
     reps        : nb de bonnes réponses consécutives
     due         : timestamp ms de la prochaine échéance
     lastReview  : timestamp ms de la dernière révision
   
   Progression :
     reps=0 → interval=1j
     reps=1 → interval=6j
     reps≥2 → interval = round(prev_interval × ef)
   
   Erreur : reps=0, interval=1j, ef pénalisé (-0.15)
   "Je savais" = qualité 4 (SM-2) → EF inchangé
   Pas de qualité 1-5 : interface volontairement binaire
══════════════════════════════════════════ */
var STORAGE_KEY = 'uke_flash_v3';
var DAY_MS = 24 * 60 * 60 * 1000;

var ALL_ITEMS = [];
CHORDS.forEach(function(c){
  ALL_ITEMS.push({key:c.id+'_name',    chordId:c.id, side:'name'});
  ALL_ITEMS.push({key:c.id+'_diagram', chordId:c.id, side:'diagram'});
});

var sr = loadSR();

function freshItem(){ return { interval:1, ef:2.5, reps:0, due:0, lastReview:0 }; }

function loadSR() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var p = JSON.parse(raw);
      ALL_ITEMS.forEach(function(it){
        if (!p.items[it.key]) {
          p.items[it.key] = freshItem();
        } else if (p.items[it.key].ef === undefined) {
          // Migration depuis ancien format (compteur relatif)
          var old = p.items[it.key];
          p.items[it.key] = {
            interval : Math.max(1, old.interval || 1),
            ef       : 2.5,
            reps     : old.interval > 6 ? 2 : old.interval > 1 ? 1 : 0,
            due      : 0,   // reset les échéances relatives
            lastReview: 0
          };
        }
      });
      return p;
    }
  } catch(e){}
  var fresh = { items:{} };
  ALL_ITEMS.forEach(function(it){ fresh.items[it.key] = freshItem(); });
  return fresh;
}

function saveSR(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sr)); }catch(e){} }

/* ── STREAK ── */
var STREAK_KEY = 'uke_streak_v1';
var GRACE_MS   = 36 * 60 * 60 * 1000;

function loadStreak() {
  try { var r = localStorage.getItem(STREAK_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { count:0, best:0, lastTs:0 };
}
function saveStreak(sk) { try { localStorage.setItem(STREAK_KEY, JSON.stringify(sk)); } catch(e){} }
function recordStreak() {
  var now = Date.now(), sk = loadStreak();
  var today = new Date().toDateString();
  var last  = sk.lastTs ? new Date(sk.lastTs).toDateString() : null;
  if (last === today) { /* déjà joué aujourd'hui */ }
  else if (sk.lastTs && (now - sk.lastTs) <= GRACE_MS) { sk.count++; }
  else { sk.count = 1; }
  sk.best   = Math.max(sk.best || 0, sk.count);
  sk.lastTs = now;
  saveStreak(sk);
  return sk;
}

function resetSR(){
  sr = { items:{} };
  ALL_ITEMS.forEach(function(it){ sr.items[it.key] = freshItem(); });
  saveSR();
}

function getModeItems(modeId){
  var ids;
  if(modeId === 'custom'){
    ids = app.customChordIds || [];
  } else {
    ids = MODES[modeId].chordIds || CHORDS.map(function(c){ return c.id; });
  }
  return ALL_ITEMS.filter(function(it){ return ids.indexOf(it.chordId) !== -1; });
}

function nextItem(modeId, recentIds){
  var now = Date.now();
  recentIds = recentIds || [];
  var pool = getModeItems(modeId).filter(function(i){ return recentIds.indexOf(i.chordId) === -1; });
  // Si le pool est vide (peu d'accords dans le mode), on relâche : on autorise tout sauf le tout dernier
  if (!pool.length && recentIds.length > 1) {
    var lastOnly = [recentIds[recentIds.length - 1]];
    pool = getModeItems(modeId).filter(function(i){ return lastOnly.indexOf(i.chordId) === -1; });
  }
  if (!pool.length) pool = getModeItems(modeId);

  // Items en retard (ou jamais vus) : on pioche au hasard parmi TOUS — aucun biais d'ordre
  var overdue = pool.filter(function(i){ return (sr.items[i.key]||freshItem()).due <= now; });
  if (overdue.length > 0){
    return overdue[Math.floor(Math.random() * overdue.length)];
  }

  // Toutes les cartes sont dans le futur : préférer les plus proches de leur échéance
  pool.sort(function(a,b){
    return (sr.items[a.key]||freshItem()).due - (sr.items[b.key]||freshItem()).due;
  });
  var band = Math.max(1, Math.ceil(pool.length / 3));
  var candidates = pool.slice(0, band);
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function recordAnswer(key, correct){
  var now = Date.now();
  var d = sr.items[key] || freshItem();

  if (correct) {
    var newInterval;
    if      (d.reps === 0) newInterval = 1;
    else if (d.reps === 1) newInterval = 6;
    else                   newInterval = Math.round(d.interval * d.ef);
    d.reps++;
    d.interval   = newInterval;
    // ef inchangé pour qualité 4 (SM-2 standard)
  } else {
    d.reps     = 0;
    d.interval = 1;
    d.ef       = Math.max(1.3, (d.ef || 2.5) - 0.15);
  }

  d.due        = now + d.interval * DAY_MS;
  d.lastReview = now;
  sr.items[key] = d;
  saveSR();
}

// itemMastery : 0–1 pour une face individuelle
// Courbe en racine carrée — récompense dès le 1er succès
//   reps=0          → 0%
//   reps=1 (iv=1j)  → ~18%  (boost iv artificiel à 4 pour visibilité)
//   reps=2 (iv=6j)  → ~24%
//   reps=3 (iv=15j) → ~40%
//   reps=4 (iv=38j) → ~65%
//   reps=5 (iv=95j) → 100%
function itemMastery(d) {
  if (!d || d.reps === 0) return 0;
  var iv = d.interval || 1;
  if (d.reps === 1) iv = 4; // premier succès doit être visible immédiatement
  return Math.min(Math.sqrt(Math.max(iv - 1, 0) / 88), 1);
}

// Maîtrise globale d'un accord (moyenne des deux faces)
function chordMastery(id){
  var n = itemMastery(sr.items[id+'_name']);
  var d = itemMastery(sr.items[id+'_diagram']);
  return (n + d) / 2;
}

// Stats d'un mode
// pct  = maîtrise moyenne en % (ce qui remplit les barres)
// mastered = faces avec reps ≥ 3 (connaît bien la carte)
function getModeStats(modeId){
  var items = getModeItems(modeId);
  var totalMastery = 0;
  var mastered = 0;
  items.forEach(function(it){
    var m = itemMastery(sr.items[it.key]);
    totalMastery += m;
    if ((sr.items[it.key] || freshItem()).reps >= 3) mastered++;
  });
  var pct = items.length > 0 ? Math.round(mastered / items.length * 100) : 0;
  return { mastered:mastered, total:items.length, pct:pct };
}

function exportProgress() {
  var d   = new Date();
  var ds  = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

function importProgress(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.items || data.app !== 'ukulele') {
        alert('⚠️ Ce fichier ne correspond pas à l\'application Ukulélé.');
        return;
      }
      var dateStr = data.date ? new Date(data.date).toLocaleDateString('fr-FR') : 'inconnue';
      if (!confirm('Remplacer ta progression actuelle par celle du fichier ?\n📅 Date de la sauvegarde : '+dateStr)) return;
      ALL_ITEMS.forEach(function(it) { if (data.items[it.key]) sr.items[it.key] = data.items[it.key]; });
      saveSR();
      render();
    } catch(x) {
      alert('⚠️ Fichier invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
}

var _historyReady = false;
var _chordDetailNav = false;
var _chordDetailDir = 0; // -1 = prev, +1 = next, 0 = entry

function _doRender(root){
  if     (app.screen==='home')          renderHome(root);
  else if(app.screen==='mode-preview')  renderModePreview(root);
  else if(app.screen==='custom-select') renderCustomSelect(root);
  else if(app.screen==='session')       renderSession(root);
  else if(app.screen==='end')           renderEnd(root);
  else if(app.screen==='reference')     renderReference(root);
  else if(app.screen==='chord-detail')  renderChordDetail(root);
}

/* ══════════════════════════════════════════
   NAVIGATION & HISTORY
   ──────────────────────────────────────────
   Chaque écran crée une entrée dans l'historique
   pour que le bouton retour système (Android, geste iOS,
   navigateur) revienne à l'écran précédent au lieu de
   quitter l'app.

   Règles :
   - home → toujours replaceState (depth = 0)
   - chord-detail prev/next → replaceState (lateral)
   - session → end et end → session (Rejouer) → replaceState
   - même écran rerendu (next question) → replaceState
   - tout le reste → pushState (forward, depth + 1)

   Boutons in-app :
   - "Retour" (←) → navBack() : history.back() pour vraie
     navigation arrière (popstate render l'écran précédent)
   - "Accueil" (🏠) → navHome() : history.go(-depth) pour
     remonter d'un coup à la racine
══════════════════════════════════════════ */
function navBack(){
  if ((history.state && history.state.depth) || history.length > 1) {
    history.back();
  } else {
    app.screen = 'home';
    render();
  }
}
function navHome(){
  var depth = (history.state && history.state.depth) || 0;
  if (depth > 0) {
    history.go(-depth);
  } else {
    app.screen = 'home';
    render();
  }
}

function render(){
  var root=document.getElementById('app');
  root.innerHTML='';
  if (_historyReady) {
    var top      = history.state || {};
    var topScreen= top.screen;
    var topDepth = top.depth || 0;
    var st = { screen:app.screen, detailIds:app.detailIds, detailIdx:app.detailIdx, detailContext:app.detailContext, depth:topDepth };

    if (app.screen === 'home') {
      st.depth = 0;
      history.replaceState(st, '');
    } else if (app.screen === 'chord-detail' && _chordDetailNav) {
      // prev/next au sein du dictionnaire — pas de nouvelle entrée
      // (_chordDetailNav sera reset par renderChordDetail après lecture)
      history.replaceState(st, '');
    } else if (app.screen === topScreen) {
      // Même écran re-rendu (next question pendant session) — refresh state
      history.replaceState(st, '');
    } else if (
      (app.screen === 'end'     && topScreen === 'session') ||
      (app.screen === 'session' && topScreen === 'end')
    ) {
      // Transition session↔end : on garde une seule entrée pour la "vie" du quiz
      history.replaceState(st, '');
    } else {
      // Forward navigation : nouvelle entrée historique
      st.depth = topDepth + 1;
      history.pushState(st, '');
    }
  }
  _doRender(root);
}

window.addEventListener('popstate', function(e) {
  var s = (e.state && e.state.screen) || 'home';
  // Sécurité : end ne devrait jamais être une cible de back (remplacé par session/home)
  if (s === 'end') s = 'home';
  // Sécurité : session re-poppée sans contexte → retour à home (le quiz est perdu)
  if (s === 'session' && !app.item) s = 'home';

  app.screen = s;
  if (e.state) {
    if (e.state.detailIds)         app.detailIds = e.state.detailIds;
    if (e.state.detailIdx != null) app.detailIdx = e.state.detailIdx;
    if (e.state.detailContext)     app.detailContext = e.state.detailContext;
  }
  var root = document.getElementById('app');
  root.innerHTML = '';
  _doRender(root);
});

      } else if (revealed) {
        cBody.classList.toggle('flipped');
      }
    }
  }, { passive: true });

  function advance(correct){
    var isSandbox = MODES[app.modeId] && MODES[app.modeId].sandboxCorrect;
    // En mode libre : les bonnes réponses ne modifient pas le SR
    if(correct && !isSandbox) recordAnswer(item.key, true);
    if(!correct)              recordAnswer(item.key, false);
    if(correct){
      playSuccess(app.session.streak);
      app.session.streak++;
    } else {
      playFail();
      app.session.streak=0;
    }
    // Buffer anti-doublon : on garde les 2 derniers chordId
    app.recentChordIds.push(item.chordId);
    if (app.recentChordIds.length > 2) app.recentChordIds.shift();
    app.session.total++;
    if(correct) app.session.correct++;
    if(app.session.total>=SESSION_LENGTH){
      if(!isSandbox) app.streakResult = recordStreak();
      app.screen='end';
    } else {
      app.item=nextItem(app.modeId, app.recentChordIds);
      app.screen='session';
    }
    render();
  }
  document.getElementById('bOk').onclick=function(){ advance(true);  };
  document.getElementById('bKo').onclick=function(){ advance(false); };
}

/* ── END ── */
function renderEnd(root){
  var mode=MODES[app.modeId];
  var st=getModeStats(app.modeId);
  var delta=st.mastered-app.session.masteryAtStart;
  var correct=app.session.correct;

  var div=document.createElement('div');
  div.className='end-screen fadein';

  var isSandbox = mode.sandboxCorrect;
  var masteryBlock;
  if(isSandbox){
    var errors = SESSION_LENGTH - correct;
    masteryBlock =
      '<div class="end-sandbox-card">'+
        '<div class="end-sandbox-title">✏️ Session libre</div>'+
        '<div class="end-sandbox-body">'+
          (errors > 0
            ? errors+' erreur'+(errors>1?'s':'')+' enregistrée'+(errors>1?'s':'')+' dans ta progression.<br>Les bonnes réponses ne comptent pas en mode libre — elles ne faussent pas ton score réel.'
            : 'Aucune erreur — rien n\'a changé dans ta progression.<br>Lance un vrai mode pour que tes réussites comptent !')+
        '</div>'+
      '</div>';
  } else {
    masteryBlock =
      '<div class="end-mastery-card">'+
        '<div class="end-mastery-title">Progression globale</div>'+
        '<div class="end-mastery-row">'+
          '<div class="end-m-val">'+st.mastered+'<span class="slash"> / '+st.total+'</span></div>'+
          '<div class="end-track">'+
            '<div class="end-prog-track"><div class="end-prog-fill" id="endFill" style="width:0%;background:'+mode.progColor+'"></div></div>'+
            '<div class="end-prog-pct">'+st.pct+'% maîtrisé</div>'+
          '</div>'+
        '</div>'+
        (delta>0?'<div class="end-m-delta up" style="margin-top:10px;">+'+delta+' face'+(delta>1?'s':'')+' maîtrisée'+(delta>1?'s':'')+' cette session 🎉</div>':
                 '<div class="end-m-delta same" style="margin-top:10px;">Continue pour progresser !</div>')+
      '</div>';
  }

  var badgeStyle='background:'+mode.progColor+'22;color:'+mode.progColor+';';
  div.innerHTML=
    '<div class="end-badge" style="'+badgeStyle+'">'+mode.icon+' '+mode.name+'</div>'+
    '<div class="end-score-wrap popin">'+
      '<span class="end-emoji">'+sessionEmoji(correct)+'</span>'+
      '<div class="end-score">'+correct+'<span> / '+SESSION_LENGTH+'</span></div>'+
      '<div class="end-label">'+sessionMsg(correct)+'</div>'+
    '</div>'+
    masteryBlock+
    (function(){
      var sk = app.streakResult;
      if (!sk || sk.count < 1) return '';
      var dayWord = sk.count > 1 ? 'jours de suite' : '1er jour';
      return '<div class="end-streak-card">'+
        '<div class="end-streak-left">'+
          '<div class="end-streak-flame">🔥</div>'+
          '<div><div class="end-streak-count">'+sk.count+'</div>'+
          '<div class="end-streak-lbl">'+dayWord+'</div></div>'+
        '</div>'+
        '<div class="end-streak-best"><strong>'+sk.best+'</strong>record</div>'+
      '</div>';
    }())+
    '<div class="end-btn-row">'+
      '<button class="btn-home-end" id="bEndHome">'+ICON_HOME+'<span>Accueil</span></button>'+
      '<button class="btn-replay" id="bReplay" style="background:'+mode.progColor+'">'+ICON_RELOAD+'<span>Rejouer</span></button>'+
    '</div>';
  root.appendChild(div);

  if(!isSandbox){
    setTimeout(function(){
      var fill=document.getElementById('endFill');
      if(fill) fill.style.width=st.pct+'%';
    }, 120);
  }
  // fanfare pour série parfaite
  if(correct===SESSION_LENGTH) setTimeout(function(){ playVictory(); }, 200);

  document.getElementById('bEndHome').onclick=function(){ navHome(); };
  document.getElementById('bReplay').onclick=function(){
    if(app.modeId==='custom'){
      app.screen='custom-select'; render(); return;
    }
    var st0=getModeStats(app.modeId);
    app.session={ correct:0, total:0, masteryAtStart:st0.mastered, streak:0 };
    app.item=nextItem(app.modeId, app.recentChordIds);
    app.screen='session';
    render();
  };
}

/* ── MODE PREVIEW ── */
function renderModePreview(root){
  var mode = MODES[app.modeId];
  var chordIds = mode.chordIds;

  var div = document.createElement('div');
  div.className = 'preview-screen fadein';

  var top = document.createElement('div');
  top.className = 'preview-top';
  top.innerHTML = '<button class="btn-nav-back" id="pBack" aria-label="Retour">'+ICON_BACK+'<span class="btn-nav-label">Retour</span></button>'+
    '<h2 class="preview-h">'+mode.icon+' '+mode.name+'</h2>';
  div.appendChild(top);

  var sub = document.createElement('div');
  sub.className = 'preview-sub';
  sub.innerHTML = chordIds.length+' accords à réviser — appuie sur un diagramme pour l\'agrandir';
  div.appendChild(sub);

  var grid = document.createElement('div');
  grid.className = 'preview-grid';
  chordIds.forEach(function(id, idx){
    var c = byId(id);
    if(!c) return;
    var item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = drawDiagram(c,'sm')+
      '<div class="preview-name">'+c.name+
        (c.sub ? '<br><span style="font-size:10px;font-style:italic;color:var(--muted)">'+c.sub+'</span>' : '')+
      '</div>';
    item.onclick = function(){
      // Réutilise l'écran chord-detail (même animation Tinder, légende, boutons)
      app.detailIds = chordIds.slice();
      app.detailIdx = idx;
      app.detailContext = 'mode-preview';
      app.screen = 'chord-detail';
      render();
    };
    grid.appendChild(item);
  });
  div.appendChild(grid);

  var btn = document.createElement('button');
  btn.className = 'btn-start-preview';
  btn.style.background = mode.progColor;
  btn.innerHTML = '<span>Démarrer la session</span>'+ICON_ARROW_RIGHT;
  div.appendChild(btn);

  root.appendChild(div);

  document.getElementById('pBack').onclick = function(){ navBack(); };

  btn.onclick = function(){
    var st0 = getModeStats(app.modeId);
    app.session = { correct:0, total:0, masteryAtStart:st0.mastered, streak:0 };
    app.item = nextItem(app.modeId, app.recentChordIds);
    app.screen = 'session';
    render();
  };
}
/* ── CUSTOM SELECT ── */
var MIN_CUSTOM = 5;
function renderCustomSelect(root){
  var sel = app.customChordIds.slice();

  var div=document.createElement('div');
  div.className='sel-screen fadein';

  // Top bar
  var top=document.createElement('div');
  top.className='sel-top';
  top.innerHTML='<button class="btn-nav-back" id="sBk" aria-label="Retour">'+ICON_BACK+'<span class="btn-nav-label">Retour</span></button>'+
    '<h2 class="ref-h">Session personnalisée</h2>';
  div.appendChild(top);

  // Meta bar (count + actions) — refs gardées pour update in-place
  var meta=document.createElement('div');
  meta.className='sel-meta';
  var countSpan = document.createElement('span');
  var actions = document.createElement('div');
  actions.className='sel-actions';
  actions.innerHTML=
    '<button class="btn-sel-link" id="sAll">Tout</button>'+
    '<button class="btn-sel-link" id="sClear">Effacer</button>';
  meta.appendChild(countSpan);
  meta.appendChild(actions);
  div.appendChild(meta);

  // Grid — construite une seule fois, items mémorisés
  var grid=document.createElement('div');
  grid.className='sel-grid';
  var itemEls = {}; // id → element
  CHORDS.forEach(function(c){
    var item=document.createElement('div');
    item.className='sel-item';
    item.innerHTML=
      '<div class="sel-check">✓</div>'+
      drawDiagram(c,'sm')+
      '<div class="sel-item-name">'+c.name+
        (c.sub?'<br><span style="font-size:9px;font-style:italic;color:var(--muted)">'+c.sub+'</span>':'')+
      '</div>';
    item.onclick=function(){
      var idx=sel.indexOf(c.id);
      if(idx===-1){ sel.push(c.id); item.classList.add('selected'); }
      else        { sel.splice(idx,1); item.classList.remove('selected'); }
      updateMeta();
    };
    itemEls[c.id] = item;
    grid.appendChild(item);
  });
  div.appendChild(grid);

  // Start button
  var btnStart=document.createElement('button');
  btnStart.className='btn-start-custom';
  btnStart.innerHTML='<span>Démarrer</span>'+ICON_ARROW_RIGHT;
  div.appendChild(btnStart);

  // Sandbox note
  var note=document.createElement('p');
  note.className='custom-sandbox-note';
  note.innerHTML='Mode libre · Les erreurs affectent ta progression,<br>les bonnes réponses ne la modifient pas';
  div.appendChild(note);

  root.appendChild(div);

  // Met à jour uniquement le compteur + le bouton (pas de rebuild de la grille)
  function updateMeta(){
    var n=sel.length;
    var cls = n>=MIN_CUSTOM?'ok':n>0?'warn':'bad';
    countSpan.className = 'sel-count '+cls;
    countSpan.textContent = n>=MIN_CUSTOM
      ? n+' accord'+(n>1?'s':'')+' sélectionné'+(n>1?'s':'')+' ✓'
      : n+' / '+MIN_CUSTOM+' minimum';
    btnStart.disabled = n < MIN_CUSTOM;
  }

  // Sync visuel initial depuis sel
  sel.forEach(function(id){ if(itemEls[id]) itemEls[id].classList.add('selected'); });
  updateMeta();

  document.getElementById('sBk').onclick=function(){ navBack(); };
  document.getElementById('sAll').onclick=function(){
    sel = CHORDS.map(function(c){return c.id;});
    CHORDS.forEach(function(c){ itemEls[c.id].classList.add('selected'); });
    updateMeta();
  };
  document.getElementById('sClear').onclick=function(){
    sel = [];
    CHORDS.forEach(function(c){ itemEls[c.id].classList.remove('selected'); });
    updateMeta();
  };

  btnStart.onclick=function(){
    if(sel.length < MIN_CUSTOM) return;
    app.customChordIds = sel.slice();
    saveCustomSel(app.customChordIds);
    app.modeId='custom';
    app.session={ correct:0, total:0, masteryAtStart:0, streak:0 };
    app.item=nextItem('custom', app.recentChordIds);
    app.screen='session';
    render();
  };
}

/* ── REFERENCE ── */
function renderReference(root){
  var div=document.createElement('div');
  div.className='ref-screen fadein';

  var top=document.createElement('div');
  top.className='ref-top';
  top.innerHTML='<button class="btn-nav-back" id="bBack" aria-label="Retour">'+ICON_BACK+'<span class="btn-nav-label">Retour</span></button><h2 class="ref-h">Tous les accords</h2>';
  div.appendChild(top);

  var sortBar=document.createElement('div');
  sortBar.className='sort-bar';
  [['alpha','A–Z'],['best','★ Mieux maîtrisés'],['worst','⚠ À travailler']].forEach(function(s){
    var b=document.createElement('button');
    b.className='sort-btn'+(app.refSort===s[0]?' active':'');
    b.textContent=s[1];
    b.onclick=function(){ app.refSort=s[0]; renderReference(root); };
    sortBar.appendChild(b);
  });
  div.appendChild(sortBar);

  var sorted=CHORDS.slice();
  if(app.refSort==='alpha')  sorted.sort(function(a,b){return a.name.localeCompare(b.name);});
  else if(app.refSort==='best')  sorted.sort(function(a,b){return chordMastery(b.id)-chordMastery(a.id);});
  else sorted.sort(function(a,b){return chordMastery(a.id)-chordMastery(b.id);});

  var grid=document.createElement('div');
  grid.className='ref-grid';
  sorted.forEach(function(c, idx){
    var m=chordMastery(c.id), pct=Math.round(m*100);
    var col = pct===100 ? '#12B558' : m>=0.75 ? '#7A9A35' : m>=0.4 ? '#C49225' : '#C04848';
    var pctLabel = pct===100 ? '✔️' : pct+'%';
    var card=document.createElement('div');
    card.className='ref-item';
    card.innerHTML=drawDiagram(c,'sm')+
      '<div class="ref-name">'+c.name+(c.sub ? '<br><span style="font-size:10px;font-style:italic;color:var(--muted)">'+c.sub+'</span>' : '')+'</div>'+
      '<div class="ref-bar"><div class="ref-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="ref-pct">'+pctLabel+'</div>';
    card.onclick = function(){
      app.detailIds  = sorted.map(function(x){ return x.id; });
      app.detailIdx  = idx;
      app.detailContext = 'reference';
      app.screen     = 'chord-detail';
      render();
    };
    grid.appendChild(card);
  });
  div.appendChild(grid);

  var footer=document.createElement('div');
  footer.className='ref-footer';
  footer.innerHTML='<button class="btn-reset" id="bReset">Réinitialiser toute la progression</button>';
  div.appendChild(footer);

  root.innerHTML='';
  root.appendChild(div);
  document.getElementById('bBack').onclick=function(){ navBack(); };
  document.getElementById('bReset').onclick=function(){
    if(confirm('Effacer toute la progression ? Cette action est irréversible.')){ resetSR(); render(); }
  };
}

/* ── CHORD DETAIL ── */
function renderChordDetail(root){
  var ids = app.detailIds;

  var div=document.createElement('div');
  div.className='detail-screen fadein';

  // ── Top (statique) ──
  var top=document.createElement('div');
  top.className='detail-top';
  var counterSpan = document.createElement('span');
  counterSpan.className = 'detail-counter';
  // Titre : "Dictionnaire" depuis le référentiel, nom du mode depuis une preview
  var title = 'Dictionnaire';
  if (app.detailContext === 'mode-preview' && MODES[app.modeId]) {
    title = MODES[app.modeId].icon + ' ' + MODES[app.modeId].name;
  }
  top.innerHTML =
    '<button class="btn-nav-back" id="dBack" aria-label="Retour">'+ICON_BACK+'<span class="btn-nav-label">Retour</span></button>'+
    '<h2 class="ref-h">'+title+'</h2>';
  top.appendChild(counterSpan);
  div.appendChild(top);

  // ── Card stack (effet deck) ──
  var stack=document.createElement('div');
  stack.className='detail-card-stack';
  var currentCard=document.createElement('div');
  currentCard.className='detail-card';
  if (!_chordDetailNav) currentCard.classList.add('popin');
  stack.appendChild(currentCard);
  div.appendChild(stack);

  // ── Légende (statique) ──
  var leg=document.createElement('div');
  leg.className='detail-legend';
  [['1','index'],['2','majeur'],['3','annulaire'],['4','auriculaire']].forEach(function(p){
    leg.innerHTML+='<span><div class="det-dot">'+p[0]+'</div>'+p[1]+'</span>';
  });
  div.appendChild(leg);

  // ── Boutons prev/next (statiques, juste disabled qui change) ──
  var nav=document.createElement('div');
  nav.className='detail-nav';
  var bPrev=document.createElement('button');
  bPrev.className='btn-nav';
  bPrev.innerHTML='<span class="btn-nav-ic prev">'+ICON_BACK+'</span><span>Précédent</span>';
  var bNext=document.createElement('button');
  bNext.className='btn-nav';
  bNext.innerHTML='<span>Suivant</span><span class="btn-nav-ic next">'+ICON_ARROW_RIGHT+'</span>';
  nav.appendChild(bPrev);
  nav.appendChild(bNext);
  div.appendChild(nav);

  root.appendChild(div);

  // ── Helpers ──
  function buildCardHTML(c){
    var m = chordMastery(c.id);
    var pct = Math.round(m*100);
    var col = pct===100 ? '#12B558' : m>=0.75 ? '#7A9A35' : m>=0.4 ? '#C49225' : '#C04848';
    var pctLabel = pct===100 ? '✔️' : pct+'%';
    return '<div class="detail-name">'+c.name+'</div>'+
      (c.sub ? '<div class="detail-sub">'+c.sub+'</div>' : '')+
      '<div class="detail-diag">'+drawDiagram(c,'lg')+'</div>'+
      '<div class="detail-prog-row">'+
        '<div class="detail-bar"><div class="detail-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
        '<div class="detail-pct">'+pctLabel+' maîtrisé</div>'+
      '</div>';
  }
  function syncUI(idx){
    counterSpan.textContent = (idx+1)+' / '+ids.length;
    bPrev.disabled = (idx === 0);
    bNext.disabled = (idx === ids.length - 1);
    if (_historyReady && history.state && history.state.screen === 'chord-detail') {
      var st = Object.assign({}, history.state, { detailIdx: idx });
      history.replaceState(st, '');
    }
  }

  // ── Render initial du contenu ──
  currentCard.innerHTML = buildCardHTML(byId(ids[app.detailIdx]));
  syncUI(app.detailIdx);
  _chordDetailNav = false;
  _chordDetailDir = 0;

  // ── Navigation avec stack animation ──
  var animating = false;
  function navigateTo(newIdx, dir){
    if (animating) return;
    if (newIdx < 0 || newIdx >= ids.length) return;
    animating = true;

    app.detailIdx = newIdx;
    var c = byId(ids[newIdx]);

    // Nouvelle carte insérée derrière (grid stacking — pas d'absolute)
    var newCard = document.createElement('div');
    newCard.className = 'detail-card behind';
    newCard.innerHTML = buildCardHTML(c);
    stack.insertBefore(newCard, currentCard);

    // Carte courante : monte en couche supérieure et part hors-cadre
    currentCard.classList.remove('popin','slide-in-left','slide-in-right');
    currentCard.classList.add('front-anim');
    void currentCard.offsetWidth; // reflow
    currentCard.classList.add(dir > 0 ? 'fly-out-left' : 'fly-out-right');

    // Nouvelle carte : se met au premier plan
    newCard.classList.remove('behind');
    newCard.classList.add('coming-in');

    syncUI(newIdx);

    var oldCard = currentCard;
    currentCard = newCard;

    setTimeout(function(){
      oldCard.remove();
      currentCard.classList.remove('coming-in');
      animating = false;
    }, 460);
  }

  function goPrev(){ navigateTo(app.detailIdx - 1, -1); }
  function goNext(){ navigateTo(app.detailIdx + 1,  1); }

  // Swipe gestures
  var touchStartX = 0, touchStartY = 0, touchActive = false;
  stack.addEventListener('touchstart', function(e){
    if (animating) return;
    var t = e.changedTouches[0];
    touchStartX = t.clientX; touchStartY = t.clientY; touchActive = true;
  }, { passive: true });
  stack.addEventListener('touchend', function(e){
    if(!touchActive) return;
    touchActive = false;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) goNext();
      else        goPrev();
    }
  }, { passive: true });

  document.getElementById('dBack').onclick=function(){ navBack(); };
  bPrev.onclick = goPrev;
  bNext.onclick = goNext;
}

render();
history.replaceState({ screen: 'home', depth: 0 }, '');
_historyReady = true;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() { navigator.serviceWorker.register('./sw.js'); });
}
</script>
